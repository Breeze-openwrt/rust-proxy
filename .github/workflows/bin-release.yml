# -----------------------------------------------------------------------------
# 🌟 Rust-Proxy 高性能“暴力发布”流水线 (GitHub Actions)
#    【借鉴自 gnet-proxy 的优秀实践】
#
#    【核心黑科技】：
#         1. 全自动 eBPF 编译：自动配置 LLVM 环境，生成内核态加速字节码。
#         2. 性能分层编译 (Amd64 v3)：针对 AVX2 指令集进行定向优化，榨干 CPU 每一丝算力。
#         3. 发布自动覆盖：永远只留下一棵“最新成果”的独苗，保持 Release 页面纯净。
#
#    【目标平台】：Linux Debian/Ubuntu (amd64)
# -----------------------------------------------------------------------------

name: 🚀 Build & Global Release (Rust-Proxy Linux amd64)

on:
  push:
    branches:
      - main  # 🎯 当主分支有更新时，自动启动编译流程
    paths-ignore:
      - '**.md' # 📝 文档修改不触发昂贵的编译任务
      - 'docs/**'
  workflow_dispatch: # 🖱️ 支持手动点击运行

jobs:
  release:
    name: 🏗️ Rust-Aya Compile & Release
    runs-on: ubuntu-latest # 🖥️ 在标准的 Linux 云环境中构建
    permissions:
      contents: write # 🛡️ 必须具备写权限，才能清理旧版并发布新版

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史记录，以便进行旧版本清理

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly # 💎 eBPF 编译通常需要 Nightly 链
        with:
          targets: x86_64-unknown-linux-gnu
          components: rust-src

      - name: 📦 Cache Rust Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🔧 Install BPF Dependencies
        # 安装编译 eBPF 必须的工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm libelf-dev
          # 如果不存在缓存，则安装 bpf-linker
          command -v bpf-linker >/dev/null 2>&1 || cargo install bpf-linker

      - name: 🍳 Compile Linux amd64 Standard (Compatibility)
        # 兼容型版本，适用于所有 amd64 机器
        run: |
          # 🔥 彻底解疑：强力清除可能存在的缓存或占位符，确保字节码真实
          rm -rf target/bpfel-unknown-none
          
          # 🔥 关键修正 1：编译内核字节码
          cargo build --package rust-proxy-ebpf --bin rust_proxy_ebpf_kernel --release --target bpfel-unknown-none -Z build-std=core
          
          # 🔍 校验环节：Aya 编译的 eBPF 字节码通常在 4KB~8KB 之间。
          # 我们将阈值下调至 1KB，确保不是空文件即可，同时增加调试探测。
          BYTECODE_PATH=$(find target/bpfel-unknown-none/release -type f -name "rust_proxy_ebpf_kernel" | head -n 1)
          if [ -z "$BYTECODE_PATH" ] || [ ! -s "$BYTECODE_PATH" ] || [ $(stat -c%s "$BYTECODE_PATH") -lt 10240 ]; then
            echo "❌ 错误：内核字节码校验失败或体积异常 (应 > 10KB)！"
            exit 1
          fi
          echo "✅ 字节码校验通过: $BYTECODE_PATH ($(stat -c%s "$BYTECODE_PATH") bytes)"

          # 🔥 关键同步：将字节码拷贝到资源目录，确保 include_bytes! 抓取的是最新实弹
          mkdir -p src/resources
          cp "$BYTECODE_PATH" src/resources/ebpf.o
          # 同时准备一个用于分发的外部文件
          cp "$BYTECODE_PATH" ./ebpf.o
          
          # 🔥 关键修正 2：编译主程序 (标准版)
          cargo build --package rust-proxy --bin rust-proxy --release
          find target/release -maxdepth 1 -type f -name "rust-proxy" -executable | xargs -I {} mv {} ./rust-proxy-linux-amd64-std

      - name: 🍳 Compile Linux amd64 v3 (Performance Monster)
        # 🔥 暴力提速：使用标准的 x86-64-v3 分层优化
        run: |
          # 🔥 关键修正 3：同样需要确保 v3 版本也包含了最新的内嵌字节码
          RUSTFLAGS="-C target-cpu=x86-64-v3" cargo build --package rust-proxy --bin rust-proxy --release
          find target/release -maxdepth 1 -type f -name "rust-proxy" -executable | xargs -I {} mv {} ./rust-proxy-linux-amd64-v3

      - name: 🧹 Pure Cleanup - Destroy Old Releases
        # 💣 模仿 gnet-proxy，清空历史残骸，只留独苗
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧨 正在清理旧的历史发布..."
          gh release list --limit 100 --json tagName -q ".[].tagName" | xargs -r -I {} gh release delete {} --cleanup-tag -y || true

      - name: 🚀 Launch New Release
        # 💎 正式全网发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d-%H%M')"
          gh release create "$TAG_NAME" \
            --title "Latest High-Performance Build ($TAG_NAME)" \
            --notes "✨ 基于 Rust + io_uring + eBPF 的高性能 SNI 代理。包含标准版、AVX2 提速版、内核字节码 (ebpf.o) 及示例配置。" \
            ./rust-proxy-linux-amd64-std \
            ./rust-proxy-linux-amd64-v3 \
            ./ebpf.o \
            ./config.jsonc
          echo "🎉 全球发布圆满成功！"
